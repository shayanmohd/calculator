plugins {
    id 'com.android.application'
}

android {
    namespace 'com.minimalist.calculator'
    compileSdk 35

    defaultConfig {
        applicationId 'com.socialsure.calculator'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
